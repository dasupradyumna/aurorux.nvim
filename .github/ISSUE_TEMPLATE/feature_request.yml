name: Feature Request
description: Suggest a new feature or an improvement for aurorux.nvim
title: "feature: "
assignees: [dasupradyumna]
labels: [feat]
body:
  - type: checkboxes
    attributes:
      label: Did you check the documentation and existing issues?
      description: Make sure you have checked all of the below checkboxes before submitting an issue
      options:
        - label: I have read all the aurorux.nvim documentation
          required: true
        - label: I have searched through all existing issues of aurorux.nvim
          required: true
  - type: textarea
    validations:
      required: true
    attributes:
      label: Describe the feature you'd like implemented in aurorux.nvim
      description: A clear and concise description of what you want to happen.
  - type: textarea
    validations:
      required: true
    attributes:
      label: Describe alternatives you've considered
      description: |
        A clear and concise description of any alternative solutions or features you've considered.
  - type: textarea
    validations:
      required: false
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
